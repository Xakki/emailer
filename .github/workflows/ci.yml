name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4', '8.5']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo, pdo_mysql, pdo_sqlite, json, fileinfo, redis, intl, mbstring, bcmath
          coverage: xdebug
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict --no-check-publish

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install dependencies
        run: composer update --no-interaction --no-progress --prefer-dist

      - name: Coding standard (PSR-12 strict)
        run: composer cs-check

      - name: Static analysis (PHPStan level 7)
        run: composer phpstan

      - name: Unit & integration tests
        run: vendor/bin/phpunit -c phpunit.xml

      - name: Coverage (enforce >= 70% lines)
        if: matrix.php == '8.4'
        run: |
          vendor/bin/phpunit -c phpunit.xml \
            --coverage-text --only-summary-for-coverage-text \
            --coverage-clover=build/clover.xml
          php -r '
            $xml = simplexml_load_file("build/clover.xml");
            $m = $xml->project->metrics;
            $covered = (int) $m["coveredstatements"];
            $total = (int) $m["statements"];
            $pct = $total ? round($covered / $total * 100, 2) : 0;
            fwrite(STDERR, "Line coverage: {$pct}% ({$covered}/{$total})\n");
            if ($pct < 70) { fwrite(STDERR, "Coverage below 70% threshold\n"); exit(1); }
          '
